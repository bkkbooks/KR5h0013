front:
  text: 元始天尊說藥王救八十一難經隸四爾時元始天尊在大羅天上八景天中召集十方三界萬億真仙無鞅聖衆說無量度人至真妙法時於會中有一真人名曰救苦越班而出執簡長跪上白天尊曰伏聞上古人民少染疾病壽延千歲今時世人多生患難天促年齡是何因緣惟願天尊大聖為衆演說得聞至道天尊告曰汝等救苦能為衆生問其因緣吾當為說汝等諦聽夫上古之人遵崇大道修省本源不殺不害不嫉不妬不欲不貪不淫不盜言無誑妄口無惡聲不分人我不與物爭體性淳朴形質固守故無灾難遂得壽命延長享及百千餘歲近世衆生不敬天地不懼神明心生嫉妬意起貪嗔殺生害命利己損人大斗小稱瞞昧愚民惡口兩舌綺言誑語倚强淩弱伏富吞貧淫污良善損害好人萬過千愆果報速生以致上天遣差五瘟使者行病吏兵降下灾殃散與病患或中風或傷寒或瘟疫或泄瀉或痢疾或火眼或惡瘡諸般病症使身心身恍惚形體不寧卧枕著床無所求效輕者旬日痊疴重者箇月痾至於過愆滿盈經年纍月纏綿不愈以及喪命殞身年未半百少壯夭亡皆是不善之因以致如斯真人再告天尊曰特開慈憫開示愚蒙凡今欲界衆生不知禁戒有犯罪愆難逃憲網遣降患難或至妖亡何由救免伏望天尊大慈普施好生之德廣開救濟之門矜憐愚昧免遭灾難於是天尊重告真人曰此難匪醫不救匪醫不療昔有秦神時為國醫源洞曉醫深明脉理號稱神應王扁鵲為神最罪積功無量勑封靈應藥王真君玄默通乎天地妙用動乎鬼神普濟群生名傳天下有救八十一難真經當傳世人流通看誦可免患難若有善男信女請此真經至誠安奉虔心供養即得永世無灾平生少病如遇有灾之日即於靜處建立道場潔備香花燈燭請命道士或自持念救難真經三過五過乃至數十百過致感靈應真君默送靈丹妙藥夢寐針炙調治遂得疾病消除灾厄洗滌身軀輕健形體如常凡有患難急當焚香誦經指日平安於是說靈應真君救八十一難應驗曰
