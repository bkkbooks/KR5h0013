front:
  text: 元始天尊說藥王救八十一難眞經爾時元始天尊在大羅天上八景宮中召集十方三界萬億眞仙無鞅聖眾說無量度人至眞妙法時於會中有一眞人名曰救苦越班而出執簡長跪上白天尊曰伏聞上古人民少染疾病夀延千𡻕今時世人多生患難夭促年齡是何因緣惟願天尊大聖爲眾演說得聞至道天尊告曰汝等救苦能爲眾生問其因緣吾當爲說汝等諦聽夫上古之人遵崇大道修省本源不殺不害不嫉不妬不欲不貪不淫不盜言無誑妄口無惡聲不分人我不與物爭體性淳樸形質固守故無災難遂得夀命延長享及百千餘𡻕近世眾生不敬天地不懼神明心生嫉妬意起貪嗔殺生害命利己損人大斗小秤瞞昧愚民惡口兩舌綺言妄語倚强凌弱仗富吞貧淫污良善損害好人萬過千愆果報速生以致上天遣差五瘟使者行病吏兵降下災殃散與病患或中風或傷寒或瘟疫或泄瀉或痢疾或火眼或惡瘡諸般病症使身心恍惚形體不寕臥枕着牀無所求效輕者旬日痊疴重者箇月沉疴至於過愆滿盈經年累月纏綿不愈以及喪命殞身年未半百少壯夭亡皆是不善之因以致如斯眞人再白天尊曰願垂慈憫開示愚蒙凡今慾界眾生不知禁戒有犯罪愆難逃憲網遣降患難多致夭亡何由救免伏望天尊大慈普施好生之德廣開救濟之門矜憐愚昧免遭災難於是天尊重告眞人曰此難匪醫不救匪醫不療昔有秦神時爲國醫洞曉醫源深明脉理號稱神應王扁鵲爲神最著積功無量勅封靈應藥王眞君玄默通乎天地妙用動乎鬼神普濟羣生名傳天下有救八十一難眞經當傳世人流通看誦可免患難若有善男信女請此眞經至誠安奉䖍心供養卽得永世無災平生少病如遇有災之日卽於靜處建立道場潔備香花燈燭延請道士或自持念救難眞經三過五過乃至數十百過致感靈應眞君默送靈丹妙藥夢昧針灸調治遂得疾病消除災厄洗滌身軀輕健形體如常凡有患難急當焚香誦經指日平安於是說靈應眞君救八十一難應驗曰
